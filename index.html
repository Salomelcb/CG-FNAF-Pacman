<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>FNAF Pac-Man Project</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        /* MENU */
        #menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        .botao {
            width: 300px;
            cursor: pointer;
            transition: 0.2s;
        }

        .botao:hover {
            transform: scale(1.1);
        }
    </style>
</head>


<body>

    <!-- THREE JS -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module" src="./JavaScript/appThree.js"></script>

    <!-- overlay de inspeção do objeto -->
    <div id="inspecao-overlay" style="
        display: none;
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 8;
        flex-direction: column; align-items: center; justify-content: flex-start;
    ">
        <div id="inspecao-titulo" style="
            margin-top: 6%;
            color: #ffffff;
            font-family: Arial, sans-serif;
            font-size: 1.9em;
            font-weight: bold;
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
            text-align: center;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            opacity: 0;
            line-height: 2.2;
        ">
            <span style="font-size:0.6em; font-weight:400; color:#dddddd; letter-spacing:0.03em;">
                O companheiro inseparável de Chica
            </span><br>
            <span style="font-size:0.45em; font-weight:300; color:#999999; letter-spacing:0.02em;">
                clica fora para fechar
            </span>
        </div>
    </div>

</body>
</html>

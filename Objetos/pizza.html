<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pizza — Freddy Fazbear's Pizza</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }

    #canvas {
      display: block; position: fixed;
      top: 0; left: 0; z-index: 1;
    }

    .vinheta {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 18%, transparent 78%, rgba(0,0,0,0.8) 100%),
        linear-gradient(to right,  rgba(0,0,0,0.7) 0%, transparent 14%, transparent 86%, rgba(0,0,0,0.7) 100%);
      pointer-events: none; z-index: 2;
    }

    .scanlines {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
      pointer-events: none; z-index: 2;
    }
  </style>

  <script async src="https://unpkg.com/es-module-shims@2.0.10/dist/es-module-shims.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.173/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.173/examples/jsm/",
        "OrbitControls": "https://cdn.jsdelivr.net/npm/three@0.173/examples/jsm/controls/OrbitControls.js"
      }
    }
  </script>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="vinheta"></div>
  <div class="scanlines"></div>
  <script type="module" src="js/pizza.js"></script>
</body>
</html>
